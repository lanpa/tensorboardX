on:
  workflow_dispatch:
    inputs:
      publish_version:
        description: 'Version to publish (e.g., 2.6.5)'
        required: true
        type: string
      publish_to_real_pypi:
        description: 'Actually publish to the real PyPI (not just test site)?'
        required: true
        type: boolean
        default: false

jobs:
  log-the-inputs:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "target version: ${{ github.event.inputs.publish_version }}"
          echo "publish to real pypi: ${{ github.event.inputs.publish_to_real_pypi }}"
        env:
          VERSION: ${{ github.event.inputs.publish_version }}

  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
    - name: Dump GitHub context
      id: github_context_step
      run: |
          echo '${{ toJSON(github) }}'
          echo "target version: ${{ github.event.inputs.publish_version }}"

    - uses: actions/checkout@v3
    - name: Set up Python 3.9
      uses: actions/setup-python@v3
      with:
        python-version: 3.9

    - name: Make sure the branch name is "refs/heads/releases/*"
      run: |
        if [[ "${{ github.ref }}" != refs/heads/releases/* ]]; then
          echo "This workflow only runs on branches matching 'releases/*'. Current branch: ${{ github.ref }}"
          exit 1
        fi

    - name: Fetch git tags and create version tag
      run: |
        git fetch --tags origin
        PUBLISH_VERSION=${{ github.event.inputs.publish_version }}
        if [[ $PUBLISH_VERSION == v* ]]; then
          TAG_VERSION=$PUBLISH_VERSION
        else
          TAG_VERSION="v$PUBLISH_VERSION"
        fi
        git tag $TAG_VERSION

    - name: Install build and wheel packages
      run: >-
        python -m
        pip install
        build wheel
        --user

    - name: Build wheel and source distribution
      run: |
        echo `pwd`
        python -m build --wheel --sdist

    - name: Install tensorboardX from wheel
      run: pip install dist/tensorboardx*.whl

    - name: Print version
      run: python -c "import tensorboardX; print(tensorboardX.__version__)"

    - name: Check version matches publish_version
      run: |
        EXPECTED_VERSION=${{ github.event.inputs.publish_version }}
        if [[ $EXPECTED_VERSION == v* ]]; then
          EXPECTED_VERSION=${EXPECTED_VERSION#v}
        fi
        VERSION=$(python -c "import tensorboardX; print(tensorboardX.__version__)")
        if [ "$VERSION" != "$EXPECTED_VERSION" ]; then
          echo "Version mismatch: $VERSION does not match $EXPECTED_VERSION"
          exit 1
        fi

    - name: Publish to Test PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TESTSITE }}
        repository-url: https://test.pypi.org/legacy/
        attestations: false
        skip-existing: true

    - name: Publish to PyPI
      if: github.event.inputs.publish_to_real_pypi == 'true'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API }}
        repository_url: https://upload.pypi.org/legacy/
        attestations: false
        skip-existing: true

    - name: Create GitHub Release
      if: github.event.inputs.publish_to_real_pypi == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.publish_version }}
        name: Release Version ${{ github.event.inputs.publish_version }}
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


